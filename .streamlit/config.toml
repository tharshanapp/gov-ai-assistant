[theme]
primaryColor = "#C9A227"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#EEF2F7"
textColor = "#1A2B4A"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
address = "0.0.0.0"
port = 8501

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"
serverPort = 8501

[client]
# Hide developer menu, GitHub-adjacent toolbar items for public viewers
toolbarMode = "minimal"
