services:
  ollama:
    image: ollama/ollama:latest
    container_name: gov-ollama
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 10G

  app:
    build: .
    container_name: gov-ai-assistant
    ports:
      - "127.0.0.1:8501:8501"
    env_file:
      - .env
    environment:
      AI_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      OLLAMA_EMBED_MODEL: nomic-embed-text
    volumes:
      - ./data_source:/app/data_source
      - index_cache:/app/.index_cache
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  ollama_models:
  index_cache:
